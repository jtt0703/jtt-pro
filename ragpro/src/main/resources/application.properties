spring.application.name=ragpro
server.port=8080

# =========================
# Short-term memory
# =========================
rag.short-memory.window-size=12
rag.short-memory.summary-threshold=20
rag.short-memory.redis-key-prefix=rag:session:
rag.short-memory.redis-ttl-minutes=30

# =========================
# Long-term memory
# =========================
rag.long-memory.top-k=5
rag.long-memory.similarity-threshold=0.72
rag.long-memory.auto-write=true
rag.long-memory.embedding-model=text-embedding-3-small
rag.long-memory.vector-store=milvus

# =========================
# RAG retrieval pipeline
# =========================
rag.retrieval.enable-bm25=true
rag.retrieval.enable-vector=true
rag.retrieval.enable-query-rewrite=true
rag.retrieval.enable-rerank=true
rag.retrieval.chunk-size=500
rag.retrieval.chunk-overlap=80
rag.retrieval.index-name=rag_knowledge_index

# =========================
# Redis: short-term memory / session cache
# =========================
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=123456
spring.data.redis.database=0
spring.data.redis.timeout=3000ms

# =========================
# MySQL: user profile / chat archive / metadata
# =========================
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ragpro?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# Elasticsearch: BM25 retrieval
# =========================
spring.elasticsearch.uris=http://127.0.0.1:9200
spring.elasticsearch.username=elastic
spring.elasticsearch.password=changeme

# =========================
# LLM / embedding placeholder
# =========================
rag.llm.provider=openai
rag.llm.base-url=https://api.openai.com/v1
rag.llm.api-key=sk-demo-replace-me
rag.llm.chat-model=gpt-4o-mini
